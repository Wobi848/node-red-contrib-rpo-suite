<script type="text/javascript">
    RED.nodes.registerType('sorter', {
        category: 'rpo-flow',
        color: '#E9967A',
        defaults: {
                "name":  { "value": "" },
                "mode":  { "value": "numeric" },
                "order": { "value": "asc" },
                "topN":  { "value": 0 }
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-sort',
        label: function() { return this.name || 'sorter'; },
        labelStyle: function() { return this.name ? 'node_label_italic' : ''; }
    });
</script>

<script type="text/html" data-template-name="sorter">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> <span data-i18n="sort.label.name"></span></label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-order"><i class="fa fa-sort"></i> <span data-i18n="sort.label.order"></span></label>
        <select id="node-input-order" style="width:70%">
            <option value="asc">Ascending</option>
            <option value="desc">Descending</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-mode"><i class="fa fa-font"></i> <span data-i18n="sort.label.mode"></span></label>
        <select id="node-input-mode" style="width:70%">
            <option value="numeric">Numeric</option>
            <option value="alphabetic">Alphabetic</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-topN"><i class="fa fa-filter"></i> <span data-i18n="sort.label.topN"></span></label>
        <input type="number" id="node-input-topN" min="0" style="width:70%">
        <span style="color:#aaa;margin-left:5px">0 = all</span>
    </div>
</script>

<script type="text/html" data-help-name="sorter">
    <p>Sorts an array of values ascending or descending. Also outputs original indices.</p>
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">array</span></dt><dd>Array to sort</dd>
        <dt class="optional">order / topN</dt><dd>Runtime overrides</dd>
    </dl>
    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">array</span></dt><dd>Sorted array (optionally top N)</dd>
        <dt>sort <span class="property-type">object</span></dt><dd>{ input, output, order, type, topN, originalIndices }</dd>
    </dl>
</script>
