<script type="text/javascript">
    RED.nodes.registerType('setpoint-shift', {
        category: 'rpo',
        color: '#D4600A',
        defaults: {
            "name":         { "value": "" },
            "outdoorRef":   { "value": 15 },
            "outdoorMin":   { "value": -10 },
            "setpointBase": { "value": 20 },
            "setpointMax":  { "value": 70 },
            "limitLow":     { "value": "" },
            "limitHigh":    { "value": "" },
            "decimals":     { "value": 1 }
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-sliders',
        label: function() { return this.name || 'setpoint-shift'; },
        labelStyle: function() { return this.name ? 'node_label_italic' : ''; }
    });
</script>

<script type="text/html" data-template-name="setpoint-shift">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-outdoorRef"><i class="fa fa-sun-o"></i> Outdoor ref (°C)</label>
        <input type="number" id="node-input-outdoorRef" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-outdoorMin"><i class="fa fa-snowflake-o"></i> Outdoor min (°C)</label>
        <input type="number" id="node-input-outdoorMin" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-setpointBase"><i class="fa fa-thermometer-half"></i> Setpoint at ref (°C)</label>
        <input type="number" id="node-input-setpointBase" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-setpointMax"><i class="fa fa-thermometer-full"></i> Setpoint at min (°C)</label>
        <input type="number" id="node-input-setpointMax" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-limitLow"><i class="fa fa-arrow-down"></i> Limit low (°C, optional)</label>
        <input type="number" id="node-input-limitLow" placeholder="none" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-limitHigh"><i class="fa fa-arrow-up"></i> Limit high (°C, optional)</label>
        <input type="number" id="node-input-limitHigh" placeholder="none" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-decimals"><i class="fa fa-hashtag"></i> Decimals</label>
        <input type="number" id="node-input-decimals" min="0" max="3" style="width:70%">
    </div>
</script>

<script type="text/html" data-help-name="setpoint-shift">
    <p>Sliding setpoint (Heizkurve / Aussentemperaturkompensation). Calculates a supply temperature setpoint based on outdoor temperature using linear interpolation.</p>
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">number</span></dt><dd>Outdoor temperature in °C</dd>
    </dl>
    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">number</span></dt><dd>Calculated setpoint in °C</dd>
        <dt>setpointShift <span class="property-type">object</span></dt><dd>outdoor, setpoint, outdoorRef, outdoorMin, setpointBase, setpointMax</dd>
    </dl>
</script>
