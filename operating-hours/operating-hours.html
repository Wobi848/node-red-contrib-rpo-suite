<script type="text/javascript">
    RED.nodes.registerType('operating-hours', {
        category: 'rpo',
        color: '#D4600A',
        defaults: {
            "name":            { "value": "" },
            "serviceInterval": { "value": 1000, "validate": RED.validators.number() },
            "decimals":        { "value": 2, "validate": RED.validators.number() },
            "persistent":      { "value": true }
        },
        inputs: 1,
        outputs: 2,
        icon: 'font-awesome/fa-clock-o',
        label: function() { return this.name || 'operating-hours'; },
        labelStyle: function() { return this.name ? 'node_label_italic' : ''; },
        outputLabels: ['status', 'service alarm']
    });
</script>

<script type="text/html" data-template-name="operating-hours">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-serviceInterval"><i class="fa fa-wrench"></i> Service interval (h)</label>
        <input type="number" id="node-input-serviceInterval" min="1" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-decimals"><i class="fa fa-hashtag"></i> Decimals</label>
        <input type="number" id="node-input-decimals" min="0" max="4" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-persistent"><i class="fa fa-database"></i> Persistent</label>
        <input type="checkbox" id="node-input-persistent" style="width:auto">
    </div>
</script>

<script type="text/html" data-help-name="operating-hours">
    <p>Counts operating hours and starts. Triggers a maintenance alarm when the service interval is reached.</p>
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">boolean</span></dt><dd>true = running, false = stopped</dd>
        <dt class="optional">reset <span class="property-type">boolean</span></dt><dd>true resets all counters</dd>
        <dt class="optional">resetService <span class="property-type">boolean</span></dt><dd>true resets service alarm only</dd>
    </dl>
    <h3>Output 1 — Status</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt><dd>Runtime info object</dd>
        <dt>operatingHours <span class="property-type">object</span></dt><dd>{ running, runtimeHours, starts, serviceInterval, serviceHoursRemaining, serviceDue, lastStart, lastStop }</dd>
    </dl>
    <h3>Output 2 — Service Alarm</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">boolean</span></dt><dd>true when service is due</dd>
    </dl>
</script>
