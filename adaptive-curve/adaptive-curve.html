<script type="text/javascript">
    RED.nodes.registerType('adaptive-curve', {
        category: 'rpo',
        color: '#D4600A',
        defaults: {
            "name":           { "value": "" },
            "roomSetpoint":   { "value": 22 },
            "heatingLimit":   { "value": 15 },
            "adaptationRate": { "value": 0.01 },
            "maxShift":       { "value": 10 },
            "deadband":       { "value": 0.5 },
            "topicRoom":      { "value": "room" },
            "topicOutdoor":   { "value": "outdoor" },
            "persistent":     { "value": true },
            "decimals":       { "value": 2 }
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-line-chart',
        label: function() { return this.name || 'adaptive-curve'; },
        labelStyle: function() { return this.name ? 'node_label_italic' : ''; }
    });
</script>

<script type="text/html" data-template-name="adaptive-curve">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> <span data-i18n="adaptive-curve.label.name"></span></label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-roomSetpoint"><i class="fa fa-thermometer-half"></i> <span data-i18n="adaptive-curve.label.roomSetpoint"></span></label>
        <input type="number" id="node-input-roomSetpoint" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-heatingLimit"><i class="fa fa-sun-o"></i> <span data-i18n="adaptive-curve.label.heatingLimit"></span></label>
        <input type="number" id="node-input-heatingLimit" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-adaptationRate"><i class="fa fa-sliders"></i> <span data-i18n="adaptive-curve.label.adaptationRate"></span></label>
        <input type="number" id="node-input-adaptationRate" min="0" step="0.001" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-maxShift"><i class="fa fa-arrows-v"></i> <span data-i18n="adaptive-curve.label.maxShift"></span></label>
        <input type="number" id="node-input-maxShift" min="0" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-deadband"><i class="fa fa-arrows-h"></i> <span data-i18n="adaptive-curve.label.deadband"></span></label>
        <input type="number" id="node-input-deadband" min="0" step="0.1" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-topicRoom"><i class="fa fa-home"></i> <span data-i18n="adaptive-curve.label.topicRoom"></span></label>
        <input type="text" id="node-input-topicRoom" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-topicOutdoor"><i class="fa fa-cloud"></i> <span data-i18n="adaptive-curve.label.topicOutdoor"></span></label>
        <input type="text" id="node-input-topicOutdoor" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-persistent"><i class="fa fa-save"></i> <span data-i18n="adaptive-curve.label.persistent"></span></label>
        <input type="checkbox" id="node-input-persistent" style="width:auto">
    </div>
    <div class="form-row">
        <label for="node-input-decimals"><i class="fa fa-hashtag"></i> <span data-i18n="adaptive-curve.label.decimals"></span></label>
        <input type="number" id="node-input-decimals" min="0" max="4" style="width:70%">
    </div>
</script>

<script type="text/html" data-help-name="adaptive-curve">
    <p>Self-learning heating curve. Automatically adjusts the curve shift based on room temperature feedback.</p>
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt><dd>"room" or "outdoor"</dd>
        <dt>payload <span class="property-type">number</span></dt><dd>Temperature in °C</dd>
        <dt class="optional">reset <span class="property-type">boolean</span></dt><dd>true = reset shift to 0</dd>
        <dt class="optional">shift <span class="property-type">number</span></dt><dd>Set shift to specific value</dd>
        <dt class="optional">pauseAdaptation <span class="property-type">boolean</span></dt><dd>Pause/resume learning</dd>
    </dl>
    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">number</span></dt><dd>Current shift value in K → connect to heat-curve</dd>
        <dt>adaptiveCurve <span class="property-type">object</span></dt><dd>roomTemp, error, shift, adapting, outdoor</dd>
    </dl>
</script>
