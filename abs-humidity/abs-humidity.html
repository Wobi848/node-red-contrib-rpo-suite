<script type="text/javascript">
    RED.nodes.registerType('abs-humidity', {
        category: 'rpo',
        color: '#D4600A',
        defaults: {
            "name":       { "value": "" },
            "topicTemp":  { "value": "temp" },
            "topicRh":    { "value": "rh" },
            "pressure":   { "value": 1013.25 },
            "decimals":   { "value": 2 }
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-tint',
        label: function() { return this.name || 'abs-humidity'; },
        labelStyle: function() { return this.name ? 'node_label_italic' : ''; }
    });
</script>

<script type="text/html" data-template-name="abs-humidity">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> <span data-i18n="abs-humidity.label.name"></span></label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-topicTemp"><i class="fa fa-thermometer-half"></i> <span data-i18n="abs-humidity.label.topicTemp"></span></label>
        <input type="text" id="node-input-topicTemp" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-topicRh"><i class="fa fa-tint"></i> <span data-i18n="abs-humidity.label.topicRh"></span></label>
        <input type="text" id="node-input-topicRh" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-pressure"><i class="fa fa-dashboard"></i> <span data-i18n="abs-humidity.label.pressure"></span></label>
        <input type="number" id="node-input-pressure" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-decimals"><i class="fa fa-hashtag"></i> <span data-i18n="abs-humidity.label.decimals"></span></label>
        <input type="number" id="node-input-decimals" min="0" max="4" style="width:70%">
    </div>
</script>

<script type="text/html" data-help-name="abs-humidity">
    <p>Calculates absolute humidity (g/kg) from temperature and relative humidity using the Magnus formula.</p>
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt><dd>"temp" or "rh"</dd>
        <dt>payload <span class="property-type">number</span></dt><dd>Temperature (°C) or relative humidity (%)</dd>
        <dt class="optional">pressure <span class="property-type">number</span></dt><dd>Override atmospheric pressure (hPa)</dd>
        <dt class="optional">reset <span class="property-type">boolean</span></dt><dd>true clears stored values</dd>
    </dl>
    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">number</span></dt><dd>Absolute humidity in g/kg</dd>
        <dt>absHumidity <span class="property-type">object</span></dt><dd>{ temp, rh, absHumidity, dewPoint, satPressure, pressure, unit, decimals }</dd>
    </dl>
</script>
