<script type="text/javascript">
    RED.nodes.registerType('gradient', {
        category: 'rpo-math',
        color: '#87A980',
        defaults: {
                "name": {
                        "value": ""
                },
                "unit": {
                        "value": "per_min"
                },
                "smoothing": {
                        "value": 1
                },
                "decimals": {
                        "value": 2
                },
                "alarmRate": {
                        "value": 0
                }
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-area-chart',
        label: function() { return this.name || 'gradient'; },
        labelStyle: function() { return this.name ? 'node_label_italic' : ''; }
    });
</script>

<script type="text/html" data-template-name="gradient">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> <span data-i18n="gradient.label.name"></span></label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-unit"><i class="fa fa-clock-o"></i> <span data-i18n="gradient.label.unit"></span></label>
        <select id="node-input-unit" style="width:70%">
            <option value="per_s">per second (/s)</option>
            <option value="per_min">per minute (/min)</option>
            <option value="per_h">per hour (/h)</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-smoothing"><i class="fa fa-filter"></i> <span data-i18n="gradient.label.smoothing"></span></label>
        <input type="number" id="node-input-smoothing" min="1" max="20" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-decimals"><i class="fa fa-sort-numeric-asc"></i> <span data-i18n="gradient.label.decimals"></span></label>
        <input type="number" id="node-input-decimals" min="0" max="4" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-alarmRate"><i class="fa fa-exclamation-triangle"></i> <span data-i18n="gradient.label.alarmRate"></span></label>
        <input type="number" id="node-input-alarmRate" min="0" step="0.1" style="width:70%">
        <span style="color:#aaa;margin-left:5px">0 = disabled</span>
    </div>
</script>

<script type="text/html" data-help-name="gradient">
    <p>Calculates the rate of change of a numeric value over time. First message produces no output.</p>
    <h3>Formula</h3>
    <pre>gradient = (current - previous) / dt</pre>
    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">number</span></dt><dd>Rate of change (per configured unit, smoothed if >1 sample)</dd>
        <dt>gradient <span class="property-type">object</span></dt><dd>{ current, previous, gradient, unit, dt, smoothed, alarm, alarmRate, decimals }</dd>
    </dl>
    <h3>Tips</h3>
    <ul>
        <li>Set Smoothing > 1 to average over last N gradients.</li>
        <li>Set Alarm Rate > 0 to trigger alarm when |gradient| exceeds threshold.</li>
    </ul>
</script>
