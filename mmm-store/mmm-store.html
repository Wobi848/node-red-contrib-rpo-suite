<script type="text/javascript">
    RED.nodes.registerType('mmm-store', {
        category: 'rpo',
        color: '#D4600A',
        defaults: {
                "name": {
                        "value": ""
                },
                "decimals": {
                        "value": 2
                },
                "persistent": {
                        "value": true
                }
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-database',
        label: function() { return this.name || 'mmm-store'; },
        labelStyle: function() { return this.name ? 'node_label_italic' : ''; }
    });
</script>

<script type="text/html" data-template-name="mmm-store">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-decimals"><i class="fa fa-sort-numeric-asc"></i> Decimal Places</label>
        <input type="number" id="node-input-decimals" min="0" max="4" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-persistent"><i class="fa fa-hdd-o"></i> Persistent</label>
        <input type="checkbox" id="node-input-persistent" style="width:auto;margin-top:4px">
    </div>
</script>

<script type="text/html" data-help-name="mmm-store">
    <p>Tracks and stores minimum, maximum and running average of incoming values. Optionally persists across Node-RED restarts.</p>
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">number</span></dt><dd>Numeric value to track</dd>
        <dt class="optional">reset <span class="property-type">boolean</span></dt><dd>Clear all stored statistics</dd>
    </dl>
    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt><dd>{ min, max, avg, count, last, decimals }</dd>
        <dt>mmmStore <span class="property-type">object</span></dt><dd>Same as payload</dd>
    </dl>
</script>
