name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install deps in all packages
        run: |
          for d in */; do
            dir="${d%/}"
            [ "$dir" = "node_modules" ] && continue
            [ "$dir" = "scripts" ] && continue
            [ ! -f "$dir/package.json" ] && continue
            [ -d "$dir/test" ] || continue
            echo "Installing $dir..."
            (cd "$dir" && npm install --no-audit --no-fund --silent)
          done

      - name: Run tests on all packages
        run: npm test

  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: 20.x

      - name: Run quality checks
        run: npm run check
